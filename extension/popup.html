<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  :root { color-scheme: dark; }
  body {
    width: 340px; margin: 0; background: #1c1c1e; color: #f5f5f7;
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 10px;
  }
  header .brand { display: inline-flex; align-items: center; gap: 9px; font-weight: 700; font-size: 16px; letter-spacing: -0.02em; }
  header .brand img { width: 22px; height: 22px; border-radius: 6px; }
  .toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(235,235,245,.6); }
  .switch { position: relative; width: 38px; height: 23px; cursor: pointer; }
  .switch input { display: none; }
  .switch .track {
    position: absolute; inset: 0; background: rgba(120,120,128,.32); border-radius: 12px; transition: background .18s;
  }
  .switch .knob {
    position: absolute; top: 1.5px; left: 2px; width: 20px; height: 20px;
    background: #fff; border-radius: 50%; transition: transform .18s;
    box-shadow: 0 2px 5px rgba(0,0,0,.35), 0 0 0 0.5px rgba(0,0,0,.08);
  }
  .switch input:checked + .track { background: #30d158; }
  .switch input:checked + .track + .knob { transform: translateX(14px); }
  .switch input:disabled + .track { opacity: .4; }
  .note {
    margin: 0 16px 8px; padding: 9px 12px;
    background: rgba(255,214,107,.1); border: 0.5px solid rgba(255,214,107,.3);
    color: #ffd66b; border-radius: 10px; font-size: 12px; display: none;
  }
  .note a { color: #ffe199; cursor: pointer; text-decoration: underline; }
  .hint { padding: 0 16px 12px; font-size: 11.5px; color: rgba(235,235,245,.45); }
  kbd {
    background: rgba(255,255,255,.1); border: 0.5px solid rgba(255,255,255,.14);
    border-radius: 4px; padding: 0 4px; font: 10px ui-monospace, "SF Mono", Menlo, monospace;
  }
  .subhead {
    padding: 4px 18px 6px; font-size: 11px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase; color: rgba(235,235,245,.5);
  }
  #list {
    max-height: 380px; overflow-y: auto; margin: 0 12px; padding: 3px;
    background: rgba(255,255,255,.05);
    border: 0.5px solid rgba(255,255,255,.08);
    border-radius: 12px;
  }
  #list:empty { display: none; }
  #list::-webkit-scrollbar { width: 8px; }
  #list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.16); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
  .item {
    display: grid; grid-template-columns: 56px 1fr auto; gap: 10px; align-items: center;
    padding: 8px; border-radius: 9px;
  }
  .item + .item { border-top: 0.5px solid rgba(255,255,255,.07); }
  .item:hover { background: rgba(255,255,255,.06); }
  .item img {
    width: 56px; height: 38px; object-fit: cover; border-radius: 7px;
    border: 0.5px solid rgba(255,255,255,.12); background: #101013;
  }
  .item .mid { min-width: 0; }
  .chip {
    display: inline-block; font: 600 9px/15px -apple-system, system-ui, sans-serif; letter-spacing: .07em;
    padding: 0 7px; border-radius: 999px; margin-bottom: 3px; vertical-align: middle;
  }
  .chip.still  { background: rgba(255,255,255,.16); color: #f5f5f7; }
  .chip.motion { background: #0a84ff; color: #fff; }
  .frames { font-size: 9px; color: rgba(235,235,245,.5); margin-left: 5px; }
  .item .line {
    font-size: 11px; color: rgba(235,235,245,.65); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .copy {
    cursor: pointer; border: 0; width: 26px; height: 26px; border-radius: 50%;
    background: rgba(255,255,255,.08); color: #f5f5f7; font-size: 12px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .copy:hover { background: rgba(255,255,255,.16); }
  .empty { padding: 18px 16px 24px; color: rgba(235,235,245,.4); font-size: 12px; text-align: center; }
  footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 16px 13px; border-top: 0.5px solid rgba(255,255,255,.09); margin-top: 10px;
    font-size: 12.5px;
  }
  footer a { color: rgba(235,235,245,.55); cursor: pointer; text-decoration: none; }
  footer a:hover { color: #fff; }
  footer .right { display: inline-flex; gap: 14px; }
  footer .opt, footer .studio { color: #0a84ff; font-weight: 500; }
  footer .opt:hover, footer .studio:hover { color: #64b5ff; }
</style>
</head>
<body>
  <header>
    <span class="brand"><img src="icons/icon48.png" alt="" />FramePick</span>
    <label class="toggle-wrap">Picker
      <span class="switch">
        <input type="checkbox" id="toggle" />
        <span class="track"></span><span class="knob"></span>
      </span>
    </label>
  </header>
  <div class="note" id="keyNote">No API key set — <a id="keyLink">add your API key</a> to generate prompts.</div>
  <div class="hint">Arm the picker, then click any image / video / GIF on the page. <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>P</kbd> toggles · <kbd>Esc</kbd> exits.</div>
  <div class="subhead">History</div>
  <div id="list"></div>
  <div class="empty" id="emptyMsg" style="display:none">Nothing picked yet — prompts you generate will show up here.</div>
  <footer>
    <a id="clear">Clear All</a>
    <span class="right">
      <a class="studio" id="studio" title="Open FramePick Studio — your shot list">FramePick Studio</a>
      <a class="opt" id="options">Options…</a>
    </span>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
